url: https://HarriRaven.github.io/weightedVoronoi/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    base_font: {google: "Inter"}

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [demo, github]
  components:
    demo:
      text: Demo
      href: https://harriraven.shinyapps.io/weightedVoronoi-demo/
    github:
      icon: fab fa-github
      href: https://github.com/HarriRaven/weightedVoronoi
      aria-label: GitHub repository

home:
  title: weightedVoronoi
  description: >
    Tools for weighted spatial tessellation in constrained domains, including
    Euclidean and geodesic allocation, resistance surfaces, terrain anisotropy,
    scalable multisource geodesics, uncertainty-aware tessellations, and temporal
    tessellation workflows.
  links:
  - text: Live demo app
    href: https://harriraven.shinyapps.io/weightedVoronoi-demo/
  - text: Get started (vignette)
    href: articles/weighted-voronoi.html
  - text: Source code
    href: https://github.com/HarriRaven/weightedVoronoi

reference:
  - title: "Core tessellation"
    contents:
      - weighted_voronoi_domain
      - weighted_voronoi
      - weighted_voronoi_geodesic

  - title: "Prepared geodesic workflows"
    contents:
      - prepare_geodesic_context

  - title: "Advanced workflows"
    contents:
      - weighted_voronoi_uncertainty
      - weighted_voronoi_time

  - title: "Resistance and barriers"
    contents:
      - compose_resistance
      - add_barriers
